<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Poppins + Fira Math</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: "Poppins", sans-serif;
}
</style>

<script>
window.MathJax = {
  loader: {
    load: ['[tex]/mhchem']
  },
  output: {
    font: 'mathjax-fira'
  },
  tex: {
    packages: {'[+]': ['mhchem']}
  },
  startup: {
    pageReady() {
      // Precargar TODOS los datos de fuente antes de renderizar (solución oficial)
      return MathJax.startup.document.outputJax.font
        .loadDynamicFiles()
        .then(() => MathJax.startup.defaultPageReady());
    }
  }
};
</script>

<!-- Script de MathJax (SÍ hay que incluirlo) -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml-nofont.js"></script>

</head>
<body>

<p>
Ejemplo: \( a + b = c d e f g h i j k l mn o p q \)
</p>

<p>
Química: \(\ce{H2O}\) y \(\ce{CO2}\)
</p>




<script>
  // Verificar que MathJax cargó
  setTimeout(() => {
    if (typeof MathJax !== 'undefined') {
      console.log('✅ MathJax cargado:', MathJax.version);
      console.log('✅ Fuente:', MathJax.config.output.font);
    } else {
      console.log('❌ MathJax no está definido');
    }
  }, 2000);
</script>
  

  
</body>
</html>
